<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deriv V100 Pro • Fully Automated</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f11; color: #e5e7eb; }
    input, button { border-radius: 6px; outline: none; }
    #log { height: 300px; overflow-y: auto; background: #111; border: 1px solid #333; padding: 12px; font-family: 'Consolas', monospace; font-size: 13px; border-radius: 8px; }
    .stat-card { background: #18181b; border: 1px solid #27272a; padding: 1rem; border-radius: 8px; }
    .tick-box { transition: all 0.2s ease; border: 1px solid #27272a; min-width: 60px; text-align: center; }
  </style>
</head>
<body class="min-h-screen p-6">

  <div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-emerald-400">V100 Visual Pro Bot</h1>
        <div id="status" class="text-sm px-3 py-1 bg-zinc-800 rounded-full text-amber-400">Disconnected</div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-6">
      <div class="lg:col-span-3 stat-card">
        <div class="text-[10px] text-gray-500 uppercase mb-2 tracking-widest">Live Tick Stream</div>
        <div id="tickStream" class="flex gap-2 h-14 items-center overflow-hidden">
          <div class="text-gray-600 italic">Waiting for connection...</div>
        </div>
      </div>
      <div class="stat-card flex flex-col items-center justify-center">
        <div class="text-[10px] text-gray-500 uppercase tracking-widest">Last Digit</div>
        <div id="bigDigit" class="text-4xl font-black mt-1">-</div>
      </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      <div class="stat-card">
        <div class="text-xs text-gray-500">Balance</div>
        <div id="balanceDisplay" class="text-xl font-bold">$0.00</div>
      </div>
      <div class="stat-card">
        <div class="text-xs text-gray-500">Profit/Loss</div>
        <div id="profitDisplay" class="text-xl font-bold text-white">$0.00</div>
      </div>
      <div class="stat-card">
        <div class="text-xs text-gray-500">Wins / Losses</div>
        <div class="text-xl font-bold text-emerald-400"><span id="winCount">0</span> / <span id="lossCount" class="text-red-400">0</span></div>
      </div>
      <div class="stat-card">
        <div class="text-xs text-gray-500">Total Trades</div>
        <div id="totalTrades" class="text-xl font-bold">0</div>
      </div>
    </div>

    <div class="bg-zinc-900 p-6 rounded-lg border border-zinc-800 mb-6">
      <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">
        <div>
          <label class="block text-[10px] text-gray-500 uppercase mb-1">API Token</label>
          <input id="token" type="password" class="w-full bg-zinc-800 border border-zinc-700 p-2 text-sm">
        </div>
        <div>
          <label class="block text-[10px] text-gray-500 uppercase mb-1">Stake</label>
          <input id="stake" type="number" value="0.35" step="0.01" class="w-full bg-zinc-800 border border-zinc-700 p-2 text-sm">
        </div>
        <div>
          <label class="block text-[10px] text-gray-500 uppercase mb-1">Martingale</label>
          <input id="martingale" type="number" value="2.1" step="0.1" class="w-full bg-zinc-800 border border-zinc-700 p-2 text-sm">
        </div>
        <div>
          <label class="block text-[10px] text-gray-500 uppercase mb-1">TP ($)</label>
          <input id="tp" type="number" value="5" class="w-full bg-zinc-800 border border-zinc-700 p-2 text-sm">
        </div>
        <div>
          <label class="block text-[10px] text-gray-500 uppercase mb-1">SL ($)</label>
          <input id="sl" type="number" value="10" class="w-full bg-zinc-800 border border-zinc-700 p-2 text-sm">
        </div>
      </div>
      <div class="flex gap-4">
        <button onclick="connectAndAuthorize()" class="flex-1 bg-zinc-100 hover:bg-white text-black py-3 font-bold transition">Connect Account</button>
        <button onclick="toggleBot()" id="startBtn" disabled class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-3 font-bold transition">Start Trading</button>
      </div>
    </div>

    <div id="log"></div>
  </div>

<script>
let ws = null, isRunning = false, openContract = false;
let baseStake = 0.35, currentStake = 0.35, sessionProfit = 0;
let wins = 0, losses = 0, total = 0;
let lastTicks = [];

const logEl = document.getElementById('log');
const streamEl = document.getElementById('tickStream');
const bigDigitEl = document.getElementById('bigDigit');

function log(msg, color = 'text-gray-400') {
  const time = new Date().toLocaleTimeString([], {hour12:false});
  logEl.innerHTML += `<div class="py-1 border-b border-zinc-800/30 ${color}"><span class="opacity-40 mr-2">[${time}]</span> ${msg}</div>`;
  logEl.scrollTop = logEl.scrollHeight;
}

function updateVisuals(quote) {
  const digit = Math.floor(quote * 100) % 10;
  bigDigitEl.textContent = digit;
  bigDigitEl.className = `text-4xl font-black mt-1 ${digit >= 8 ? 'text-emerald-400' : 'text-white'}`;

  lastTicks.push({ price: quote.toFixed(2), digit: digit });
  if (lastTicks.length > 8) lastTicks.shift();

  streamEl.innerHTML = lastTicks.map(t => `
    <div class="tick-box p-2 bg-zinc-800 rounded ${t.digit >= 8 ? 'border-emerald-500 border' : ''}">
      <div class="text-[9px] text-gray-500">${t.price}</div>
      <div class="text-sm font-bold ${t.digit >= 8 ? 'text-emerald-400' : 'text-white'}">${t.digit}</div>
    </div>
  `).join('');
}

function connectAndAuthorize() {
  const token = document.getElementById('token').value.trim();
  if (!token) return alert('Token required');
  
  // Set trading parameters
  baseStake = parseFloat(document.getElementById('stake').value);
  currentStake = baseStake;

  if (ws) ws.close();
  ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');

  ws.onopen = () => ws.send(JSON.stringify({ authorize: token }));

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    if (msg.msg_type === 'authorize' && !msg.error) {
      log('Authorized Successfully', 'text-emerald-400');
      document.getElementById('status').textContent = 'Connected';
      document.getElementById('status').className = 'text-sm px-3 py-1 bg-emerald-900/30 rounded-full text-emerald-400';
      document.getElementById('startBtn').disabled = false;
      ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
      ws.send(JSON.stringify({ ticks: 'R_100', subscribe: 1 }));
    }

    if (msg.msg_type === 'balance') {
      document.getElementById('balanceDisplay').textContent = `$${msg.balance.balance.toFixed(2)}`;
    }

    if (msg.msg_type === 'tick') {
      const quote = msg.tick.quote;
      const digit = Math.floor(quote * 100) % 10;
      updateVisuals(quote);

      if (isRunning && !openContract && (digit === 8 || digit === 9)) {
        log(`Trigger Hit (${digit}) → Placing Order...`, 'text-yellow-400');
        openContract = true; // Block further triggers until done
        placeProposal();
      }
    }

    if (msg.msg_type === 'proposal' && !msg.error) {
      ws.send(JSON.stringify({ buy: msg.proposal.id, price: msg.proposal.ask_price }));
    }

    if (msg.msg_type === 'buy') {
      if (msg.error) {
        log('Execution Failed: ' + msg.error.message, 'text-red-400');
        openContract = false;
        return;
      }
      total++;
      document.getElementById('totalTrades').textContent = total;
      log('TRADE ACTIVE (Under 8)', 'text-emerald-400 font-bold');
      ws.send(JSON.stringify({ proposal_open_contract: 1, contract_id: msg.buy.contract_id, subscribe: 1 }));
    }

    if (msg.msg_type === 'proposal_open_contract' && msg.proposal_open_contract.is_sold) {
      const p = parseFloat(msg.proposal_open_contract.profit);
      sessionProfit += p;
      openContract = false;

      if (p > 0) {
        wins++;
        currentStake = baseStake;
        log(`Result: WIN +$${p.toFixed(2)}`, 'text-emerald-400 font-bold');
      } else {
        losses++;
        currentStake *= parseFloat(document.getElementById('martingale').value);
        log(`Result: LOSS -$${Math.abs(p).toFixed(2)}`, 'text-red-400 font-bold');
      }

      document.getElementById('winCount').textContent = wins;
      document.getElementById('lossCount').textContent = losses;
      document.getElementById('profitDisplay').textContent = (sessionProfit >= 0 ? '+' : '') + `$${sessionProfit.toFixed(2)}`;
      document.getElementById('profitDisplay').className = `text-xl font-bold ${sessionProfit >= 0 ? 'text-emerald-400' : 'text-red-400'}`;
      
      checkLimits();
    }
  };
}

function placeProposal() {
  ws.send(JSON.stringify({
    proposal: 1, amount: currentStake, basis: 'stake', 
    contract_type: 'DIGITUNDER', barrier: '8', 
    currency: 'USD', duration: 1, duration_unit: 't', symbol: 'R_100'
  }));
}

function checkLimits() {
    const tp = parseFloat(document.getElementById('tp').value);
    const sl = parseFloat(document.getElementById('sl').value);
    if (sessionProfit >= tp || sessionProfit <= -sl) {
        log(`Target reached ($${sessionProfit.toFixed(2)}). Stopping bot.`, 'text-white font-bold bg-zinc-800 px-2');
        toggleBot();
    }
}

function toggleBot() {
  isRunning = !isRunning;
  const btn = document.getElementById('startBtn');
  btn.textContent = isRunning ? 'Stop Bot' : 'Start Bot';
  btn.className = isRunning ? 'flex-1 bg-red-600 hover:bg-red-500 py-3 font-bold transition' : 'flex-1 bg-emerald-600 hover:bg-emerald-500 py-3 font-bold transition';
  if (!isRunning) log('Bot Stopped.', 'text-amber-400');
}
</script>
</body>
</html>
