<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>V100 Turbo • 90% Safe Mode</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0b0b0d; color: #e5e7eb; }
    input, button { border-radius: 4px; outline: none; transition: all 0.2s; }
    #log { height: 350px; overflow-y: auto; background: #000; border: 1px solid #222; padding: 10px; font-family: 'Consolas', monospace; font-size: 11px; }
    .stat-card { background: #141417; border: 1px solid #27272a; padding: 1rem; border-radius: 6px; }
    .digit-bar { transition: height 0.3s ease; width: 100%; background: #3f3f46; border-radius: 2px 2px 0 0; }
    .digit-bar.highlight { background: #10b981; }
    .digit-bar.highlight-blue { background: #3b82f6; }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-6xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
        <h1 class="text-2xl font-black text-emerald-500 tracking-tighter italic">V100 TURBO <span class="text-white">90% SAFE MODE</span></h1>
        <div id="status" class="text-[10px] font-bold px-4 py-1 bg-zinc-800 rounded-full text-amber-500 uppercase tracking-widest">Offline</div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-6">
      <div class="lg:col-span-3 stat-card">
        <div class="text-[10px] text-gray-500 uppercase mb-4 font-bold tracking-widest">Digit Frequency</div>
        <div class="flex items-end justify-between h-24 gap-1" id="statsBars"></div>
        <div class="flex justify-between mt-2 text-[10px] text-gray-500 font-bold">
            <span class="text-blue-400">0</span><span class="text-blue-400">1</span><span class="text-blue-400">2</span><span>3</span><span>4</span><span>5</span><span>6</span><span class="text-emerald-500">7</span><span class="text-emerald-500">8</span><span class="text-emerald-500">9</span>
        </div>
      </div>
      <div class="stat-card flex flex-col items-center justify-center bg-zinc-950 border-zinc-800">
        <div class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Last Digit</div>
        <div id="bigDigit" class="text-6xl font-black mt-1 text-white">-</div>
      </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
      <div class="stat-card">
        <div class="text-[10px] text-gray-500 uppercase font-bold mb-1">Profit</div>
        <div id="profitDisplay" class="text-2xl font-bold">$0.00</div>
      </div>
      <div class="stat-card">
        <div class="text-[10px] text-gray-500 uppercase font-bold mb-1">Status</div>
        <div id="activeTrades" class="text-lg font-bold text-emerald-400">IDLE</div>
      </div>
      <div class="stat-card">
        <div class="text-[10px] text-gray-500 uppercase font-bold mb-1">Win Rate</div>
        <div id="winRate" class="text-2xl font-bold text-emerald-400">0%</div>
      </div>
      <div class="stat-card">
        <div class="text-[10px] text-gray-500 uppercase font-bold mb-1">Next Stake</div>
        <div id="nextStakeDisplay" class="text-2xl font-bold text-white">$0.35</div>
      </div>
      <div class="stat-card">
        <div class="text-[10px] text-gray-500 uppercase font-bold mb-1">Balance</div>
        <div id="balanceDisplay" class="text-2xl font-bold">$0.00</div>
      </div>
    </div>

    <div class="bg-zinc-900 p-6 rounded-lg border border-zinc-800 mb-6">
      <div class="grid grid-cols-2 md:grid-cols-8 gap-4 mb-6">
        <div class="col-span-2">
          <label class="block text-[9px] text-gray-500 uppercase font-bold mb-1">Token</label>
          <input id="token" type="password" class="w-full bg-black border border-zinc-800 p-2 text-sm focus:border-emerald-500">
        </div>
        <div>
          <label class="block text-[9px] text-gray-500 uppercase font-bold mb-1">Base Stake $</label>
          <input id="stake" type="number" value="0.35" step="0.01" class="w-full bg-black border border-zinc-800 p-2 text-sm focus:border-emerald-500">
        </div>
        <div>
          <label class="block text-[9px] text-gray-500 uppercase font-bold mb-1">Martingale</label>
          <input id="martingale" type="number" value="1.5" step="0.1" class="w-full bg-black border border-zinc-800 p-2 text-sm focus:border-emerald-500">
        </div>
        <div>
          <label class="block text-[9px] text-gray-500 uppercase font-bold mb-1">TP</label>
          <input id="tp" type="number" value="5" class="w-full bg-black border border-zinc-800 p-2 text-sm focus:border-emerald-500">
        </div>
        <div>
          <label class="block text-[9px] text-gray-500 uppercase font-bold mb-1">SL</label>
          <input id="sl" type="number" value="10" class="w-full bg-black border border-zinc-800 p-2 text-sm focus:border-emerald-500">
        </div>
        <div>
          <label class="block text-[9px] text-gray-500 uppercase font-bold mb-1">Skip after loss</label>
          <input id="skipAfterLoss" type="number" value="1" min="0" step="1" class="w-full bg-black border border-zinc-800 p-2 text-sm focus:border-emerald-500">
        </div>
        <div>
          <label class="block text-[9px] text-gray-500 uppercase font-bold mb-1">Max stake $</label>
          <input id="maxStake" type="number" value="5.00" step="0.1" class="w-full bg-black border border-zinc-800 p-2 text-sm focus:border-emerald-500">
        </div>
      </div>
      <div class="flex gap-4">
        <button onclick="connectAndAuthorize()" class="flex-1 bg-white text-black py-4 font-black uppercase tracking-tighter hover:bg-emerald-400 transition">Connect</button>
        <button onclick="toggleBot()" id="startBtn" disabled class="flex-1 bg-zinc-800 text-zinc-500 py-4 font-black uppercase tracking-tighter transition">Start Turbo</button>
      </div>
    </div>

    <div id="log"></div>
  </div>

<script>
let ws = null, isRunning = false;
let baseStake = 0.35, currentStake = 0.35, sessionProfit = 0;
let wins = 0, losses = 0;
let digitHistory = Array(100).fill(0);
let isWaitingForContract = false; 
let lastProcessedContractId = null;
let skipTriggers = 0;   // ← NEW: safety skip after loss

const logEl = document.getElementById('log');
const bigDigitEl = document.getElementById('bigDigit');
const activeEl = document.getElementById('activeTrades');
const nextStakeDisplay = document.getElementById('nextStakeDisplay');

function log(msg, color = 'text-gray-500') {
  const time = new Date().toLocaleTimeString([], {hour12:false, second:'2-digit'});
  logEl.innerHTML += `<div class="py-1 border-b border-zinc-900 ${color}"><span class="opacity-30 mr-2">${time}</span> ${msg}</div>`;
  logEl.scrollTop = logEl.scrollHeight;
}

function updateStats(lastDigit) {
  digitHistory.push(lastDigit);
  digitHistory.shift();
  const counts = Array(10).fill(0);
  digitHistory.forEach(d => counts[d]++);
  const max = Math.max(...counts);
  const container = document.getElementById('statsBars');
  container.innerHTML = counts.map((c, i) => {
    const height = (c / max) * 100;
    let colorClass = 'digit-bar';
    if (i <= 2) colorClass += ' highlight-blue';
    if (i >= 7) colorClass += ' highlight';
    return `<div class="flex flex-col items-center flex-1 h-full justify-end">
              <div class="text-[8px] mb-1 font-bold ${i <= 2 ? 'text-blue-400' : (i >= 7 ? 'text-emerald-400' : '')}">${c}</div>
              <div class="${colorClass}" style="height: ${height}%"></div>
            </div>`;
  }).join('');
}

function connectAndAuthorize() {
  const token = document.getElementById('token').value.trim();
  if (!token) return alert('Token required');
  
  baseStake = parseFloat(document.getElementById('stake').value) || 0.35;
  currentStake = baseStake;
  nextStakeDisplay.textContent = `$${currentStake.toFixed(2)}`;

  if (ws) ws.close();
  ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');

  ws.onopen = () => ws.send(JSON.stringify({ authorize: token }));

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    if (msg.msg_type === 'authorize' && !msg.error) {
      log('SYSTEM ONLINE: 90% SAFE MODE ACTIVE', 'text-emerald-400 font-bold');
      document.getElementById('status').textContent = 'Connected';
      document.getElementById('status').className = 'text-[10px] font-bold px-4 py-1 bg-emerald-500 text-black rounded-full uppercase tracking-widest';
      document.getElementById('startBtn').disabled = false;
      document.getElementById('startBtn').classList.replace('bg-zinc-800', 'bg-emerald-600');
      document.getElementById('startBtn').classList.replace('text-zinc-500', 'text-white');
      
      ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
      ws.send(JSON.stringify({ ticks: 'R_100', subscribe: 1 }));
    }

    if (msg.msg_type === 'balance') {
      document.getElementById('balanceDisplay').textContent = `$${msg.balance.balance.toFixed(2)}`;
    }

    if (msg.msg_type === 'tick') {
      const quote = msg.tick.quote.toString();
      const lastDigit = parseInt(quote.charAt(quote.length - 1));
      bigDigitEl.textContent = lastDigit;
      
      // Visual feedback (still works perfectly for 0 and 9)
      if (lastDigit <= 2) bigDigitEl.className = `text-6xl font-black mt-1 text-blue-400`;
      else if (lastDigit >= 7) bigDigitEl.className = `text-6xl font-black mt-1 text-emerald-400`;
      else bigDigitEl.className = `text-6xl font-black mt-1 text-white`;

      updateStats(lastDigit);

      // ── IMPROVED TRADING LOGIC ──
      // Only trade the absolute highest-probability setups (0 → Over 0, 9 → Under 9 ≈ 90%)
      if (isRunning && !isWaitingForContract) {
          if (lastDigit === 0) {
              if (skipTriggers > 0) {
                  skipTriggers--;
                  log(`⏭ Skipped 0 trigger (skips left: ${skipTriggers})`, 'text-amber-400');
              } else {
                  fireTrade(0, 'DIGITOVER');
              }
          } else if (lastDigit === 9) {
              if (skipTriggers > 0) {
                  skipTriggers--;
                  log(`⏭ Skipped 9 trigger (skips left: ${skipTriggers})`, 'text-amber-400');
              } else {
                  fireTrade(9, 'DIGITUNDER');
              }
          }
      }
    }

    if (msg.msg_type === 'proposal' && !msg.error) {
      ws.send(JSON.stringify({ buy: msg.proposal.id, price: msg.proposal.ask_price }));
    }

    if (msg.msg_type === 'buy') {
      if (msg.error) {
          log(`Order Rejected: ${msg.error.message}`, 'text-amber-500');
          isWaitingForContract = false;
          activeEl.textContent = 'IDLE';
          return;
      } 
      activeEl.textContent = 'WAITING...';
      ws.send(JSON.stringify({ proposal_open_contract: 1, subscribe: 1 }));
    }

    if (msg.msg_type === 'proposal_open_contract') {
      const contract = msg.proposal_open_contract;
      
      if (contract.is_sold && contract.contract_id !== lastProcessedContractId) {
        lastProcessedContractId = contract.contract_id;
        
        const profit = parseFloat(contract.profit);
        const entry = contract.entry_tick_display_value.slice(-1);
        const exit = contract.exit_tick_display_value.slice(-1);
        const barrier = contract.barrier;
        const type = contract.contract_type;
        
        sessionProfit += profit;

        const logMsg = `[${type}] Barrier: ${barrier} | Entry: ${entry} | Exit: ${exit}`;

        if (profit > 0) {
          wins++;
          currentStake = baseStake; 
          skipTriggers = 0;                    // ← Reset skip on win
          log(`✔ ${logMsg} (+$${profit.toFixed(2)})`, 'text-emerald-400 font-bold');
        } else {
          losses++;
          currentStake = (currentStake * parseFloat(document.getElementById('martingale').value));
          
          // ── NEW: Max stake safety cap ──
          const maxStakeVal = parseFloat(document.getElementById('maxStake').value) || 5;
          if (currentStake > maxStakeVal) {
            currentStake = baseStake;
            log('⚠️ Max stake limit reached — resetting to base', 'text-amber-500 font-bold');
          }
          
          skipTriggers = parseInt(document.getElementById('skipAfterLoss').value) || 1;   // ← Safety skip after loss
          log(`✘ ${logMsg} (-$${Math.abs(profit).toFixed(2)})`, 'text-red-500 font-bold');
        }

        nextStakeDisplay.textContent = `$${currentStake.toFixed(2)}`;
        isWaitingForContract = false; 
        activeEl.textContent = 'IDLE';
        updateDashboard();
        checkSafety();
        
        ws.send(JSON.stringify({ forget_all: "proposal_open_contract" }));
      }
    }
  };
}

function fireTrade(barrier, type) {
    isWaitingForContract = true; 
    activeEl.textContent = 'BUYING...';
    ws.send(JSON.stringify({
        proposal: 1, 
        amount: parseFloat(currentStake.toFixed(2)), 
        basis: 'stake', 
        contract_type: type, 
        barrier: barrier.toString(), 
        currency: 'USD', 
        duration: 1, 
        duration_unit: 't', 
        symbol: 'R_100'
    }));
}

function updateDashboard() {
    const total = wins + losses;
    const rate = total > 0 ? ((wins / total) * 100).toFixed(1) : 0;
    document.getElementById('winRate').textContent = `${rate}%`;
    const pd = document.getElementById('profitDisplay');
    pd.textContent = `$${sessionProfit.toFixed(2)}`;
    pd.className = `text-2xl font-bold ${sessionProfit >= 0 ? 'text-emerald-400' : 'text-red-500'}`;
}

function checkSafety() {
    const tp = parseFloat(document.getElementById('tp').value);
    const sl = parseFloat(document.getElementById('sl').value);
    if (sessionProfit >= tp || sessionProfit <= -sl) {
        log(`GOAL HIT: ${sessionProfit.toFixed(2)}`, 'text-white font-black bg-emerald-600 px-2');
        if(isRunning) toggleBot();
    }
}

function toggleBot() {
  isRunning = !isRunning;
  const btn = document.getElementById('startBtn');
  btn.textContent = isRunning ? 'Stop Turbo' : 'Start Turbo';
  btn.className = isRunning ? 'flex-1 bg-red-600 text-white py-4 font-black uppercase' : 'flex-1 bg-emerald-600 text-white py-4 font-black uppercase';
  if (!isRunning) {
      isWaitingForContract = false;
      skipTriggers = 0;
      currentStake = baseStake;
      nextStakeDisplay.textContent = `$${currentStake.toFixed(2)}`;
      activeEl.textContent = 'OFF';
  }
}
</script>
</body>
</html>
