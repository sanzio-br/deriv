<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deriv V100 Under 8 Bot • Touch 8 or 9 → Under 8</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f11; color: #e5e7eb; }
    input, button { border-radius: 6px; }
    #log { height: 300px; overflow-y: auto; background: #111; border: 1px solid #333; border-radius: 6px; padding: 12px; font-family: 'Consolas', monospace; font-size: 13px; }
    #lastDigit { font-size: 3.5rem; font-weight: bold; line-height: 1; }
    .digit-low  { color: #10b981; }
    .digit-mid  { color: #f59e0b; }
    .digit-high { color: #ef4444; }
  </style>
</head>
<body class="min-h-screen p-6">

  <div class="max-w-4xl mx-auto">

    <h1 class="text-3xl font-bold mb-6 text-center text-emerald-400">
      V100 (1s) • Touch 8/9 → Under 8
    </h1>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">

      <div>
        <label class="block text-sm text-gray-400 mb-1">API Token</label>
        <input id="token" type="password" placeholder="your deriv api token" class="w-full bg-zinc-800 border border-zinc-700 p-3 text-white">
      </div>

      <div>
        <label class="block text-sm text-gray-400 mb-1">Base Stake (USD)</label>
        <input id="stake" type="number" step="0.01" value="0.35" min="0.35" class="w-full bg-zinc-800 border border-zinc-700 p-3 text-white">
      </div>

      <div>
        <label class="block text-sm text-gray-400 mb-1">Martingale × (after loss)</label>
        <input id="marti" type="number" step="0.1" value="2.0" min="1.0" max="10" class="w-full bg-zinc-800 border border-zinc-700 p-3 text-white">
      </div>

      <div class="flex items-end gap-3">
        <button onclick="connectAndAuthorize()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 px-6 py-3 font-medium transition">
          Connect
        </button>
        <button onclick="toggleBot()" id="startBtn" disabled class="flex-1 bg-zinc-700 hover:bg-zinc-600 px-6 py-3 font-medium transition">
          Start
        </button>
      </div>

    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">

      <div>
        <label class="block text-sm text-gray-400 mb-1">Stop Loss (USD)</label>
        <input id="stopLoss" type="number" step="1" value="-50" class="w-full bg-zinc-800 border border-zinc-700 p-3 text-white">
      </div>

      <div>
        <label class="block text-sm text-gray-400 mb-1">Take Profit (USD)</label>
        <input id="takeProfit" type="number" step="1" value="100" class="w-full bg-zinc-800 border border-zinc-700 p-3 text-white">
      </div>

      <div class="flex flex-col justify-end">
        <div id="balanceDisplay" class="text-lg font-bold text-cyan-300">
          Balance: — USD
        </div>
      </div>

    </div>

    <div id="status" class="mb-4 text-center text-lg font-medium text-amber-400">Status: Disconnected</div>

    <div id="session" class="mb-3 text-center text-base">
      Session P/L: <span id="sessionPL">0.00</span> USD
    </div>

    <!-- Last Digit Indicator -->
    <div class="mb-6 p-4 bg-zinc-900 border border-zinc-700 rounded-lg text-center">
      <div class="text-sm text-gray-400 mb-2">Latest Digit (R_100)</div>
      <div id="lastDigit" class="digit-mid">—</div>
      <div class="mt-3 text-sm text-gray-500">
        Last 20 digits: <span id="digitHistory" class="font-mono text-gray-300">............................</span>
      </div>
    </div>

    <div id="log" class="mb-6">
      [System] Waiting for API token and connection...
    </div>

  </div>

<script>
let ws = null;
let isRunning = false;
let openContract = false;
let baseStake = 0.35;
let currentStake = 0.35;
let martingaleMultiplier = 2.0;
let maxStake = 10.0;
let sessionProfit = 0;
let stopLoss = -50;
let takeProfit = 100;

let recentDigits = []; // array to keep last 20 digits (newest first)

const logEl         = document.getElementById('log');
const statusEl      = document.getElementById('status');
const startBtn      = document.getElementById('startBtn');
const balanceEl     = document.getElementById('balanceDisplay');
const sessionPLEl   = document.getElementById('sessionPL');
const lastDigitEl   = document.getElementById('lastDigit');
const digitHistoryEl = document.getElementById('digitHistory');

function log(msg, color = 'text-gray-300') {
  const time = new Date().toLocaleTimeString([], {hour12:false});
  logEl.innerHTML += `<div class="${color}"><span class="text-gray-500">[${time}]</span> ${msg}</div>`;
  logEl.scrollTop = logEl.scrollHeight;
}

function updateSessionPL(profit) {
  sessionProfit += profit;
  sessionPLEl.textContent = sessionProfit.toFixed(2);
  sessionPLEl.className = sessionProfit > 0 ? 'text-emerald-400' : sessionProfit < 0 ? 'text-red-400' : 'text-gray-300';

  if (sessionProfit <= stopLoss || sessionProfit >= takeProfit) {
    log(`Session limit reached (${sessionProfit > 0 ? 'TP' : 'SL'}) → stopping bot`, 'text-purple-400 font-bold');
    if (isRunning) toggleBot();
  }
}

function resetMartingale() {
  currentStake = baseStake;
}

function increaseMartingale() {
  currentStake = Math.min(currentStake * martingaleMultiplier, maxStake);
  log(`Loss → stake increased to ${currentStake.toFixed(2)}`, 'text-orange-300');
}

function updateLastDigitIndicator(quote) {
  const digit = Math.floor(quote) % 10;
  
  // Update main digit display
  lastDigitEl.textContent = digit;
  lastDigitEl.className = 'text-6xl font-bold ' + 
    (digit <= 4 ? 'digit-low' : digit <= 7 ? 'digit-mid' : 'digit-high');

  // Update history (newest on left)
  recentDigits.unshift(digit);
  if (recentDigits.length > 20) recentDigits.pop();
  digitHistoryEl.textContent = recentDigits.join(' ') + 
    ' '.repeat(20 - recentDigits.length * 2); // pad if <20
}

function connectAndAuthorize() {
  const token = document.getElementById('token').value.trim();
  if (!token) return alert('Please enter API token');

  baseStake   = parseFloat(document.getElementById('stake').value)   || 0.35;
  martingaleMultiplier = parseFloat(document.getElementById('marti').value) || 2.0;
  stopLoss    = parseFloat(document.getElementById('stopLoss').value)  || -50;
  takeProfit  = parseFloat(document.getElementById('takeProfit').value)|| 100;

  currentStake = baseStake;
  sessionProfit = 0;
  sessionPLEl.textContent = '0.00';
  sessionPLEl.className = 'text-gray-300';
  recentDigits = [];
  digitHistoryEl.textContent = '............................';
  lastDigitEl.textContent = '—';
  lastDigitEl.className = 'text-6xl font-bold digit-mid';

  if (ws) ws.close();

  ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');

  ws.onopen = () => {
    log('WebSocket connected', 'text-emerald-400');
    ws.send(JSON.stringify({ authorize: token }));
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    if (msg.msg_type === 'authorize') {
      if (msg.error) {
        log('Authorize failed: ' + msg.error.message, 'text-red-400');
        statusEl.textContent = 'Status: Authorization failed';
        statusEl.className = 'text-red-400';
        return;
      }
      log('Authorized successfully', 'text-emerald-400');
      statusEl.textContent = 'Status: Connected & Authorized';
      statusEl.className = 'text-emerald-400';
      startBtn.disabled = false;

      ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
    }

    if (msg.msg_type === 'balance') {
      const bal = parseFloat(msg.balance.balance || 0).toFixed(2);
      balanceEl.textContent = `Balance: ${bal} USD`;
      balanceEl.className = 'text-lg font-bold ' + (parseFloat(bal) > 100 ? 'text-cyan-300' : 'text-amber-300');
    }

    if (msg.msg_type === 'tick' && msg.tick.symbol === 'R_100') {
      const quote = msg.tick.quote;
      const lastDigit = Math.floor(quote) % 10;

      // Update indicator on EVERY tick
      updateLastDigitIndicator(quote);

      // Trading logic only when running
      if (lastDigit === 8 || lastDigit === 9) {
        log(`Touch detected → last digit = ${lastDigit} → placing UNDER 8 (stake ${currentStake.toFixed(2)})`, 'text-yellow-300 font-medium');

        if (isRunning && !openContract) {
          sendProposal();
        }
      }
    }

    if (msg.msg_type === 'proposal' && !msg.error) {
      ws.send(JSON.stringify({
        buy: msg.proposal.id,
        price: msg.proposal.ask_price
      }));
    }

    if (msg.msg_type === 'buy') {
      if (msg.error) {
        log('Buy failed: ' + msg.error.message, 'text-red-400');
        openContract = false;
        resetMartingale();
        return;
      }
      log('Trade opened (UNDER 8)', 'text-emerald-400');
      openContract = true;
      ws.send(JSON.stringify({
        proposal_open_contract: 1,
        contract_id: msg.buy.contract_id,
        subscribe: 1
      }));
    }

    if (msg.msg_type === 'proposal_open_contract' && msg.proposal_open_contract.is_sold) {
      const profit = parseFloat(msg.proposal_open_contract.profit || 0);
      openContract = false;

      if (profit > 0) {
        log(`WIN +$${profit.toFixed(2)}`, 'text-emerald-400 font-medium');
        resetMartingale();
      } else {
        log(`LOSS -$${Math.abs(profit).toFixed(2)}`, 'text-red-400 font-medium');
        increaseMartingale();
      }

      updateSessionPL(profit);
    }
  };

  ws.onclose = () => {
    log('WebSocket closed', 'text-orange-400');
    statusEl.textContent = 'Status: Disconnected';
    statusEl.className = 'text-amber-400';
    startBtn.disabled = true;
  };
}

function sendProposal() {
  ws.send(JSON.stringify({
    proposal: 1,
    amount: currentStake,
    basis: 'stake',
    contract_type: 'DIGITUNDER',
    barrier: '8',
    currency: 'USD',
    duration: 1,
    duration_unit: 't',
    symbol: 'R_100'
  }));
}

function toggleBot() {
  isRunning = !isRunning;
  startBtn.textContent = isRunning ? 'Stop' : 'Start';
  startBtn.classList.toggle('bg-red-600', isRunning);
  startBtn.classList.toggle('hover:bg-red-500', isRunning);

  if (isRunning) {
    log('Bot STARTED – watching R_100 for digit 8 or 9', 'text-emerald-400 font-medium');
    ws.send(JSON.stringify({ ticks: 'R_100' }));
  } else {
    log('Bot STOPPED', 'text-amber-400');
    if (ws) ws.send(JSON.stringify({ forget_all: 'ticks' }));
  }
}

window.addEventListener('beforeunload', () => {
  if (ws) ws.close();
});
</script>
</body>
</html>
