<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deriv Differs Bot • Efficient Mode (Vol 100 1s)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>body { font-family: 'Inter', system-ui, sans-serif; } .digit-bar { transition: height 0.3s ease; }</style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-96 bg-zinc-900 border-r border-zinc-800 p-6 flex flex-col overflow-auto">
      <h1 class="text-2xl font-bold mb-6 text-emerald-400">DIFFERS BOT • EFFICIENT</h1>
      
      <div class="space-y-5">
        <div>
          <label class="block text-sm text-zinc-400 mb-1">API Token <span class="text-amber-400 text-xs">(demo first!)</span></label>
          <input id="token" type="password" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-zinc-400 mb-1">Symbol</label>
            <input id="symbol" value="R_100" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3">
          </div>
          <div>
            <label class="block text-sm text-zinc-400 mb-1">Base Stake</label>
            <input id="baseStake" value="1.00" type="number" step="0.01" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3">
          </div>
        </div>

        <div class="grid grid-cols-3 gap-3 text-xs">
          <div>
            <label>Confidence %</label>
            <input id="confidence" value="15" type="number" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2">
          </div>
          <div>
            <label>Max Risk %</label>
            <input id="maxRisk" value="2" type="number" step="0.1" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2">
          </div>
          <div>
            <label>Loss ×</label>
            <input id="lossMult" value="1.4" type="number" step="0.05" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3 text-xs">
          <div>
            <label>Session TP (USD)</label>
            <input id="sessionTP" value="50" type="number" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2">
          </div>
          <div>
            <label>Session SL (USD)</label>
            <input id="sessionSL" value="-25" type="number" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2">
          </div>
        </div>

        <div class="flex gap-3">
          <button onclick="connect()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-medium">Connect</button>
          <button onclick="toggleTrading()" id="startBtn" disabled class="flex-1 bg-zinc-700 hover:bg-zinc-600 py-3 rounded-xl font-medium">Start</button>
        </div>

        <button onclick="resetBot()" class="w-full bg-red-600/80 hover:bg-red-600 py-2 rounded-xl text-sm">Reset Bot</button>
      </div>

      <div class="mt-auto pt-8 text-xs space-y-2 text-zinc-400">
        <div>Status: <span id="status" class="text-amber-400">Disconnected</span></div>
        <div>Balance: <span id="balance" class="text-emerald-400">—</span></div>
        <div>Current Stake: <span id="curStake" class="font-medium">—</span></div>
        <div>Total P&amp;L: <span id="totalPnl" class="font-medium">0.00</span></div>
        <div>Win Rate: <span id="winRate" class="font-medium">0%</span></div>
      </div>
    </div>

    <!-- Dashboard -->
    <div class="flex-1 p-8 overflow-auto">
      <div class="mb-8">
        <h2 class="text-lg font-semibold mb-4">Last 1000 Ticks • Coldest Digit <span id="coldDigit" class="ml-4 text-5xl font-mono text-emerald-400">—</span></h2>
        <div id="digitBars" class="grid grid-cols-10 gap-2"></div>
      </div>

      <div class="mb-8 bg-zinc-900 rounded-3xl p-6">
        <h2 class="text-lg font-semibold mb-4">P&amp;L Curve</h2>
        <canvas id="pnlChart" height="110"></canvas>
      </div>

      <div>
        <h2 class="text-lg font-semibold mb-4">Live Log</h2>
        <div id="log" class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 h-[420px] overflow-auto font-mono text-sm"></div>
      </div>
    </div>
  </div>

  <script>
    // ================== CONFIG & STATE ==================
    let ws = null, isTrading = false, token = "", symbol = "R_100";
    let balance = 0, totalPnL = 0, wins = 0, losses = 0;
    let lastDigits = [], digitFreq = new Array(10).fill(0);
    let currentStake = 1, multiplier = 1;
    let consecutiveLosses = 0, openContractId = null, currentBarrier = 0;
    let pnlHistory = [], chart;
    let pingInterval = null;

    const MIN_STAKE = 0.35;
    let confidenceThreshold = 15;   // % below average
    let maxRiskPercent = 2;
    let lossMultiplier = 1.4;
    let sessionTP = 50, sessionSL = -25;

    // ================== HELPERS ==================
    function log(msg, color = "text-zinc-400") {
      const t = new Date().toLocaleTimeString();
      document.getElementById('log').innerHTML += `<div class="${color}"><span class="text-zinc-500">[${t}]</span> ${msg}</div>`;
      document.getElementById('log').scrollTop = 99999;
    }

    function round2(n) { return Math.round(n * 100) / 100; }

    function updateUI() {
      document.getElementById('curStake').textContent = currentStake.toFixed(2);
      document.getElementById('totalPnl').textContent = totalPnL.toFixed(2);
      document.getElementById('winRate').textContent = (wins + losses ? (wins / (wins + losses) * 100).toFixed(1) : 0) + "%";
    }

    function updateDigitBars() {
      const container = document.getElementById('digitBars');
      container.innerHTML = "";
      const avg = lastDigits.length / 10 || 1;
      const minF = Math.min(...digitFreq);
      const cold = digitFreq.indexOf(minF);

      document.getElementById('coldDigit').textContent = cold;

      for (let d = 0; d < 10; d++) {
        const h = Math.max(20, (digitFreq[d] / Math.max(...digitFreq)) * 180);
        const isCold = d === cold;
        container.innerHTML += `
          <div class="flex flex-col items-center">
            <div class="text-xs text-zinc-400">${d}</div>
            <div class="w-6 bg-zinc-800 rounded-t h-[180px] overflow-hidden">
              <div class="w-full ${isCold ? 'bg-emerald-500' : 'bg-zinc-700'} digit-bar" style="height:${h}px"></div>
            </div>
            <div class="text-[10px] mt-1">${digitFreq[d]} (${(digitFreq[d]/avg*100).toFixed(0)}%)</div>
          </div>`;
      }
    }

    // ================== CORE TRADING LOGIC ==================
    function shouldTrade() {
      const avg = lastDigits.length / 10;
      const minF = Math.min(...digitFreq);
      const coldPercent = (minF / avg) * 100;
      return coldPercent <= (100 - confidenceThreshold);
    }

    function calculateStake() {
      let stake = round2(balance * maxRiskPercent / 100 * multiplier);
      return Math.max(MIN_STAKE, Math.min(stake, balance * 0.05)); // never >5% even if multiplier high
    }

    function placeTrade() {
      if (!shouldTrade()) {
        log("⏸️ Skipped — confidence too low", "text-amber-400");
        return;
      }

      let minF = Math.min(...digitFreq);
      let candidates = [];
      for (let d = 0; d < 10; d++) if (digitFreq[d] === minF) candidates.push(d);
      currentBarrier = candidates[Math.floor(Math.random() * candidates.length)];

      currentStake = calculateStake();

      const req = {
        proposal: 1,
        amount: currentStake,
        basis: "stake",
        contract_type: "DIGITDIFF",
        currency: "USD",
        duration: 1,
        duration_unit: "t",
        symbol: symbol,
        barrier: currentBarrier.toString()
      };

      log(`📊 Strong setup → barrier ${currentBarrier} @ $${currentStake.toFixed(2)} (${(Math.min(...digitFreq)/(lastDigits.length/10)*100).toFixed(1)}%)`, "text-emerald-400");
      ws.send(JSON.stringify(req));
    }

    // ================== WEBSOCKET HANDLERS ==================
    function connect() {
      token = document.getElementById('token').value.trim();
      symbol = document.getElementById('symbol').value.trim() || "R_100";
      confidenceThreshold = parseFloat(document.getElementById('confidence').value) || 15;
      maxRiskPercent = parseFloat(document.getElementById('maxRisk').value) || 2;
      lossMultiplier = parseFloat(document.getElementById('lossMult').value) || 1.4;
      sessionTP = parseFloat(document.getElementById('sessionTP').value) || 50;
      sessionSL = parseFloat(document.getElementById('sessionSL').value) || -25;

      if (ws) ws.close();
      ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=1089`);

      ws.onopen = () => {
        log("✅ Connected", "text-emerald-400");
        ws.send(JSON.stringify({ authorize: token }));
        pingInterval = setInterval(() => ws.send(JSON.stringify({ping:1})), 25000);
      };

      ws.onmessage = (e) => {
        const m = JSON.parse(e.data);

        if (m.msg_type === "authorize") {
          balance = m.authorize.balance;
          document.getElementById('balance').textContent = balance.toFixed(2);
          document.getElementById('startBtn').disabled = false;
          log(`✅ Authorized | Balance $${balance.toFixed(2)}`, "text-emerald-400");
        }

        if (m.msg_type === "tick") {
          const digit = Math.floor(m.tick.quote) % 10;
          lastDigits.push(digit);
          if (lastDigits.length > 1000) lastDigits.shift();
          digitFreq.fill(0);
          lastDigits.forEach(d => digitFreq[d]++);
          updateDigitBars();

          if (isTrading && !openContractId) placeTrade();
        }

        if (m.msg_type === "proposal") {
          if (m.error) return log("Proposal error: " + m.error.message, "text-red-400");
          ws.send(JSON.stringify({ buy: m.proposal.id, price: m.proposal.ask_price }));
        }

        if (m.msg_type === "buy") {
          if (m.error) return log("Buy error: " + m.error.message, "text-red-400");
          openContractId = m.buy.contract_id;
          log(`📍 Bought DIGITDIFF (barrier ${currentBarrier}) • $${currentStake.toFixed(2)}`, "text-blue-400");
          ws.send(JSON.stringify({ proposal_open_contract: 1, contract_id: openContractId, subscribe: 1 }));
        }

        if (m.msg_type === "proposal_open_contract" && m.proposal_open_contract.is_sold) {
          const profit = parseFloat(m.proposal_open_contract.profit || 0);
          totalPnL += profit;
          updateUI();

          if (profit > 0) {
            wins++;
            consecutiveLosses = 0;
            multiplier = 1;                    // ← RESET ON WIN (key for efficiency)
            log(`🎉 WIN +$${profit.toFixed(2)} | Actual return ${(profit/currentStake*100).toFixed(1)}%`, "text-emerald-400");
          } else {
            losses++;
            consecutiveLosses++;
            multiplier = Math.min(4, multiplier * lossMultiplier); // mild recovery
            log(`💥 LOSS -$${Math.abs(profit).toFixed(2)}`, "text-red-400");
            if (consecutiveLosses >= 3) {
              stopTrading();
              log("🚨 3 LOSSES IN A ROW — BOT STOPPED", "text-red-500 font-bold");
            }
          }

          pnlHistory.push(totalPnL);
          if (chart) chart.update();

          openContractId = null;

          // Session targets
          if (totalPnL >= sessionTP || totalPnL <= sessionSL) {
            stopTrading();
            log(totalPnL >= sessionTP ? "🎯 SESSION TAKE PROFIT" : "🛑 SESSION STOP LOSS", "text-yellow-400 font-bold");
          }
        }
      };
    }

    function toggleTrading() {
      isTrading = !isTrading;
      const btn = document.getElementById('startBtn');
      btn.textContent = isTrading ? "Stop" : "Start";
      btn.classList.toggle('bg-red-600', isTrading);

      if (isTrading) {
        log("🚀 Efficient Differs Bot STARTED", "text-emerald-400");
        ws.send(JSON.stringify({ ticks: symbol }));
      } else {
        log("⏹️ Stopped", "text-amber-400");
        if (ws) ws.send(JSON.stringify({ forget_all: "ticks" }));
      }
    }

    function stopTrading() {
      isTrading = false;
      document.getElementById('startBtn').textContent = "Start";
      document.getElementById('startBtn').classList.remove('bg-red-600');
      if (ws) ws.send(JSON.stringify({ forget_all: "ticks" }));
    }

    function resetBot() {
      if (!confirm("Reset everything?")) return;
      stopTrading();
      totalPnL = wins = losses = consecutiveLosses = 0;
      multiplier = 1;
      lastDigits = []; digitFreq.fill(0); pnlHistory = [];
      updateUI(); updateDigitBars();
      log("🔄 Full reset", "text-zinc-400");
    }

    window.onload = () => {
      const ctx = document.getElementById('pnlChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: { labels: Array(50).fill(''), datasets: [{ data: [], borderColor: '#10b981', tension: 0.4 }] },
        options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#27272a' }}}}
      });
      log("👋 Efficient Differs Bot ready — use demo + confidence 15% for best results", "text-zinc-400");
    };
  </script>
</body>
</html>
