<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deriv Multi-Vol Bot • Dual Stake + Recovery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>body { font-family: 'Inter', system-ui, sans-serif; } .digit-bar { transition: height 0.3s ease; }</style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="flex h-screen">
    <div class="w-96 bg-zinc-900 border-r border-zinc-800 p-6 flex flex-col overflow-auto">
      <h1 class="text-2xl font-bold mb-6 text-emerald-400">MULTI-VOL • DUAL STAKE</h1>
      
      <div class="space-y-5">
        <div>
          <label class="block text-sm text-zinc-400 mb-1">API Token</label>
          <input id="token" type="password" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3">
        </div>

        <!-- Risk Mode -->
        <div>
          <label class="block text-sm text-zinc-400 mb-1">Risk Mode</label>
          <select id="riskMode" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3">
            <option value="percent">Percentage of Balance</option>
            <option value="fixed">Fixed Stake Amount</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div id="percentGroup">
            <label class="block text-sm text-zinc-400 mb-1">Risk % per trade</label>
            <input id="riskPercent" value="0.50" type="number" step="0.05" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3">
          </div>
          <div id="fixedGroup" class="hidden">
            <label class="block text-sm text-zinc-400 mb-1">Fixed Stake (USD)</label>
            <input id="fixedStake" value="5.00" type="number" step="0.01" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-zinc-400 mb-1">Max Concurrent</label>
            <input id="maxConcurrent" value="2" type="number" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3">
          </div>
          <div>
            <label class="block text-sm text-zinc-400 mb-1">Confidence %</label>
            <input id="confidence" value="18" type="number" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3">
          </div>
        </div>

        <!-- Recovery -->
        <div class="flex items-center gap-3">
          <input type="checkbox" id="enableRecovery" checked class="w-5 h-5">
          <label for="enableRecovery" class="text-sm">Enable Mild Recovery</label>
        </div>
        <div class="grid grid-cols-2 gap-4 text-xs" id="recoveryGroup">
          <div>
            <label>Loss Multiplier</label>
            <input id="lossMultiplier" value="1.35" type="number" step="0.05" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2">
          </div>
          <div>
            <label>Max Multiplier</label>
            <input id="maxMult" value="3" type="number" step="0.1" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2">
          </div>
        </div>

        <div class="flex gap-3">
          <button onclick="connect()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-medium">Connect</button>
          <button onclick="toggleTrading()" id="startBtn" disabled class="flex-1 bg-zinc-700 hover:bg-zinc-600 py-3 rounded-xl font-medium">Start</button>
        </div>

        <button onclick="resetBot()" class="w-full bg-red-600/80 hover:bg-red-600 py-2 rounded-xl text-sm">Reset All</button>
      </div>

      <div class="mt-8 pt-6 border-t border-zinc-700">
        <h3 class="text-lg font-semibold mb-4">Live Status</h3>
        <div id="multiTable" class="text-xs font-mono overflow-auto max-h-96"></div>
      </div>

      <div class="mt-auto pt-8 text-xs space-y-1 text-zinc-500">
        <div>Status: <span id="status" class="text-amber-400">Disconnected</span></div>
        <div>Balance: <span id="balance" class="text-emerald-400">—</span></div>
        <div>Open: <span id="openTrades">0</span>/<span id="maxConc">2</span></div>
        <div>Total P&L: <span id="totalPnl" class="font-medium">0.00</span></div>
      </div>
    </div>

    <div class="flex-1 flex flex-col">
      <div class="p-8 pb-4 flex-1 flex flex-col">
        <h2 class="text-xl font-semibold mb-4">Live Log</h2>
        <div id="log" class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 flex-1 overflow-auto font-mono text-sm"></div>
      </div>
      <div class="px-8 pb-8">
        <div class="bg-zinc-900 rounded-3xl p-6">
          <h2 class="text-lg font-semibold mb-4">P&L Curve</h2>
          <canvas id="pnlChart" height="110"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script>
    const symbols = ["R_10", "R_25", "R_50", "R_75", "R_100"];
    let ws = null, isTrading = false, token = "";
    let balance = 0, totalPnL = 0, openContracts = 0;
    let riskMode = "percent", riskPercent = 0.5, fixedStake = 5;
    let maxConcurrent = 2, confidenceThreshold = 18;
    let enableRecovery = true, lossMultiplier = 1.35, maxMultiplier = 3;
    let currentMultiplier = 1;
    let symbolData = {};
    symbols.forEach(s => symbolData[s] = {lastDigits:[], digitFreq:new Array(10).fill(0)});

    let pnlHistory = [], chart;

    function log(msg, color = "text-zinc-400") {
      const t = new Date().toLocaleTimeString();
      document.getElementById('log').innerHTML += `<div class="${color}"><span class="text-zinc-500">[${t}]</span> ${msg}</div>`;
      document.getElementById('log').scrollTop = 999999;
    }

    function getCurrentStake() {
      let base = riskMode === "fixed" ? fixedStake : round2(balance * riskPercent / 100);
      let stake = round2(base * currentMultiplier);
      return Math.max(0.35, Math.min(stake, balance * 0.1)); // safety cap
    }

    function round2(n) { return Math.round(n * 100) / 100; }

    function updateMultiTable() {
      let html = `<table class="w-full"><tr class="border-b"><th>Symbol</th><th>Cold</th><th>Conf</th></tr>`;
      symbols.forEach(s => {
        const d = symbolData[s];
        const avg = d.lastDigits.length/10 || 1;
        const minF = Math.min(...d.digitFreq);
        const cold = d.digitFreq.indexOf(minF);
        const conf = ((avg - minF)/avg*100).toFixed(1);
        html += `<tr><td>${s}</td><td class="font-bold">${cold}</td><td>${conf}%</td></tr>`;
      });
      html += `</table>`;
      document.getElementById('multiTable').innerHTML = html;
    }

    function shouldTradeForSymbol(sym) {
      const d = symbolData[sym];
      const avg = d.lastDigits.length/10 || 1;
      const minF = Math.min(...d.digitFreq);
      return (minF / avg * 100) <= (100 - confidenceThreshold);
    }

    function placeTrade(sym) {
      if (openContracts >= maxConcurrent) return;
      const d = symbolData[sym];
      let minF = Math.min(...d.digitFreq);
      let candidates = [];
      for (let i=0; i<10; i++) if (d.digitFreq[i]===minF) candidates.push(i);
      const barrier = candidates[Math.floor(Math.random()*candidates.length)];

      const stake = getCurrentStake();

      const req = {
        proposal: 1,
        amount: stake,
        basis: "stake",
        contract_type: "DIGITDIFF",
        currency: "USD",
        duration: 1,
        duration_unit: "t",
        symbol: sym,
        barrier: barrier.toString()
      };

      log(`📊 ${sym} | ${riskMode.toUpperCase()} ${riskMode==="percent"?riskPercent+"%":"$"+fixedStake} ×${currentMultiplier.toFixed(2)} → $${stake.toFixed(2)} | barrier ${barrier}`, "text-emerald-400");
      ws.send(JSON.stringify(req));
    }

    // ... (connect, toggleTrading, resetBot, onload same as previous safe version but with new logic)

    function connect() {
      token = document.getElementById('token').value.trim();
      riskMode = document.getElementById('riskMode').value;
      riskPercent = parseFloat(document.getElementById('riskPercent').value) || 0.5;
      fixedStake = parseFloat(document.getElementById('fixedStake').value) || 5;
      maxConcurrent = parseInt(document.getElementById('maxConcurrent').value) || 2;
      confidenceThreshold = parseFloat(document.getElementById('confidence').value) || 18;
      enableRecovery = document.getElementById('enableRecovery').checked;
      lossMultiplier = parseFloat(document.getElementById('lossMultiplier').value) || 1.35;
      maxMultiplier = parseFloat(document.getElementById('maxMult').value) || 3;

      if (!token) return alert("Enter API Token");

      if (ws) ws.close();
      ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=1089`);

      ws.onopen = () => {
        log("✅ Connected", "text-emerald-400");
        ws.send(JSON.stringify({ authorize: token }));
      };

      ws.onmessage = (e) => {
        const m = JSON.parse(e.data);

        if (m.msg_type === "authorize") {
          balance = m.authorize.balance;
          document.getElementById('balance').textContent = balance.toFixed(2);
          document.getElementById('startBtn').disabled = false;
        }

        if (m.msg_type === "tick") {
          const sym = m.tick.symbol;
          if (!symbolData[sym]) return;
          const digit = Math.floor(m.tick.quote) % 10;
          const d = symbolData[sym];
          d.lastDigits.push(digit);
          if (d.lastDigits.length > 1000) d.lastDigits.shift();
          d.digitFreq.fill(0);
          d.lastDigits.forEach(x => d.digitFreq[x]++);
          updateMultiTable();

          if (isTrading && openContracts < maxConcurrent && shouldTradeForSymbol(sym)) {
            placeTrade(sym);
          }
        }

        if (m.msg_type === "proposal") {
          if (!m.error) ws.send(JSON.stringify({ buy: m.proposal.id, price: m.proposal.ask_price }));
        }

        if (m.msg_type === "buy") {
          if (m.error) return log("Buy error: " + m.error.message, "text-red-400");
          openContracts++;
          document.getElementById('openTrades').textContent = openContracts;
          ws.send(JSON.stringify({ proposal_open_contract: 1, contract_id: m.buy.contract_id, subscribe: 1 }));
        }

        if (m.msg_type === "proposal_open_contract" && m.proposal_open_contract.is_sold) {
          const profit = parseFloat(m.proposal_open_contract.profit || 0);
          totalPnL += profit;
          openContracts = Math.max(0, openContracts - 1);
          document.getElementById('openTrades').textContent = openContracts;
          document.getElementById('totalPnl').textContent = totalPnL.toFixed(2);

          if (profit > 0) {
            log(`🎉 WIN +$${profit.toFixed(2)}`, "text-emerald-400");
            currentMultiplier = 1;   // reset on win
          } else {
            log(`💥 LOSS -$${Math.abs(profit).toFixed(2)}`, "text-red-400");
            if (enableRecovery) {
              currentMultiplier = Math.min(maxMultiplier, currentMultiplier * lossMultiplier);
            }
          }

          if (totalPnL <= -80) {   // you can change this
            toggleTrading();
            log("🛑 SESSION STOP LOSS HIT", "text-red-500 font-bold");
          }
        }
      };
    }

    function toggleTrading() {
      isTrading = !isTrading;
      const btn = document.getElementById('startBtn');
      btn.textContent = isTrading ? "Stop" : "Start";
      btn.classList.toggle('bg-red-600', isTrading);

      if (isTrading) {
        log(`🚀 Started | Mode: ${riskMode.toUpperCase()} | Recovery: ${enableRecovery?"ON":"OFF"}`, "text-emerald-400");
        symbols.forEach(s => ws.send(JSON.stringify({ ticks: s })));
      } else {
        if (ws) ws.send(JSON.stringify({ forget_all: "ticks" }));
        currentMultiplier = 1;
      }
    }

    function resetBot() {
      if (!confirm("Full reset?")) return;
      toggleTrading();
      totalPnL = 0; openContracts = 0; currentMultiplier = 1;
      symbols.forEach(s => { symbolData[s].lastDigits = []; symbolData[s].digitFreq.fill(0); });
      document.getElementById('totalPnl').textContent = "0.00";
      updateMultiTable();
      log("🔄 Full reset", "text-zinc-400");
    }

    window.onload = () => {
      const ctx = document.getElementById('pnlChart').getContext('2d');
      chart = new Chart(ctx, {type:'line', data:{labels:Array(100).fill(''), datasets:[{data:[], borderColor:'#10b981'}]}});
      updateMultiTable();

      // Show/hide fields when changing mode
      document.getElementById('riskMode').addEventListener('change', function() {
        const isPercent = this.value === "percent";
        document.getElementById('percentGroup').classList.toggle('hidden', !isPercent);
        document.getElementById('fixedGroup').classList.toggle('hidden', isPercent);
      });

      log("👋 Dual Stake + Recovery bot ready! Choose your mode above.", "text-zinc-400");
    };
  </script>
</body>
</html>
