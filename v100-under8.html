<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>V100 Under 8 Bot • With TP/SL + Martingale + Graph</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f11; color: #e5e7eb; }
    #mainLog, #tickLog { height: 220px; overflow-y: auto; background: #111; border: 1px solid #333; border-radius: 6px; padding: 12px; font-family: 'Consolas', monospace; font-size: 13px; }
  </style>
</head>
<body class="min-h-screen p-6">

<div class="max-w-5xl mx-auto">

  <h1 class="text-3xl font-bold mb-6 text-center text-emerald-400">V100 (1s) • Under 8 Bot</h1>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <!-- Controls -->
    <div class="bg-zinc-900 p-6 rounded-xl border border-zinc-700">
      <div class="space-y-5">
        <div>
          <label class="block text-sm text-gray-400 mb-1">API Token</label>
          <input id="token" type="password" class="w-full bg-zinc-800 border border-zinc-700 p-3 rounded-lg">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-gray-400 mb-1">Stake (USD)</label>
            <input id="stake" type="number" step="0.01" value="0.35" class="w-full bg-zinc-800 border border-zinc-700 p-3 rounded-lg">
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1">Max Open Trades</label>
            <input id="maxOpen" type="number" value="1" min="1" class="w-full bg-zinc-800 border border-zinc-700 p-3 rounded-lg">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-gray-400 mb-1">Take Profit (USD)</label>
            <input id="tp" type="number" value="30" class="w-full bg-zinc-800 border border-zinc-700 p-3 rounded-lg">
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1">Stop Loss (USD)</label>
            <input id="sl" type="number" value="-15" class="w-full bg-zinc-800 border border-zinc-700 p-3 rounded-lg">
          </div>
        </div>

        <div class="flex gap-3">
          <button onclick="connectAndAuthorize()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-medium">Connect</button>
          <button onclick="toggleBot()" id="startBtn" disabled class="flex-1 bg-zinc-700 hover:bg-zinc-600 py-3 rounded-xl font-medium">Start</button>
        </div>
      </div>
    </div>

    <!-- Status Panel -->
    <div class="bg-zinc-900 p-6 rounded-xl border border-zinc-700">
      <div class="space-y-4 text-sm">
        <div>Status: <span id="status" class="font-medium text-amber-400">Disconnected</span></div>
        <div>Balance: <span id="balance" class="font-medium text-emerald-400">—</span> USD</div>
        <div>Open Trades: <span id="openTrades">0</span></div>
        <div>Take Profit: <span id="tpDisplay" class="text-emerald-400">30</span> | Stop Loss: <span id="slDisplay" class="text-red-400">-15</span></div>
        <div>Total P&L: <span id="totalPnl" class="font-medium">0.00</span></div>
      </div>
    </div>

  </div>

  <!-- Main Log -->
  <div class="mt-6">
    <div class="flex justify-between mb-2">
      <div class="text-sm text-gray-400">Main Log</div>
      <button onclick="clearMainLog()" class="text-xs px-3 py-1 bg-zinc-700 hover:bg-zinc-600 rounded">Clear</button>
    </div>
    <div id="mainLog" class="bg-zinc-900 border border-zinc-700 rounded-xl p-4 font-mono text-sm"></div>
  </div>

  <!-- Tick History -->
  <div class="mt-6">
    <div class="text-sm text-gray-400 mb-2">Tick History (R_100) — last 50 ticks</div>
    <div id="tickLog" class="bg-zinc-900 border border-zinc-700 rounded-xl p-4 font-mono text-sm"></div>
  </div>

  <!-- Equity Curve -->
  <div class="mt-6 bg-zinc-900 border border-zinc-700 rounded-xl p-6">
    <h2 class="text-lg font-semibold mb-4">Equity Curve</h2>
    <canvas id="pnlChart" height="140"></canvas>
  </div>

</div>

<script>
let ws = null;
let isRunning = false;
let openContract = false;
let baseStake = 0.35;
let currentStake = 0.35;
let consecutiveLosses = 0;
let totalPnL = 0;
let balance = 0;
let tp = 30;
let sl = -15;

let tickHistory = [];
let pnlHistory = [];
let chart;

const mainLog = document.getElementById('mainLog');
const tickLog = document.getElementById('tickLog');
const statusEl = document.getElementById('status');

function logMain(msg, color = 'text-gray-300') {
  const time = new Date().toLocaleTimeString([], {hour12:false});
  mainLog.innerHTML += `<div class="${color}"><span class="text-gray-500">[${time}]</span> ${msg}</div>`;
  mainLog.scrollTop = mainLog.scrollHeight;
}

function addTickToHistory(quote) {
  const digit = Math.floor(quote) % 10;
  tickHistory.unshift({ time: new Date().toLocaleTimeString([], {hour12:false}), quote: quote.toFixed(3), digit });
  if (tickHistory.length > 50) tickHistory.pop();

  tickLog.innerHTML = tickHistory.map(t => 
    `<div class="${(t.digit===8||t.digit===9)?'text-red-400 font-bold':''}">${t.time} | ${t.quote} | <strong>${t.digit}</strong></div>`
  ).join('');
}

function connectAndAuthorize() {
  const token = document.getElementById('token').value.trim();
  if (!token) return alert('Enter API token');

  baseStake = parseFloat(document.getElementById('stake').value) || 0.35;
  currentStake = baseStake;
  tp = parseFloat(document.getElementById('tp').value) || 30;
  sl = parseFloat(document.getElementById('sl').value) || -15;

  if (ws) ws.close();
  ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');

  ws.onopen = () => {
    logMain('Connected to Deriv', 'text-emerald-400');
    ws.send(JSON.stringify({ authorize: token }));
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    if (msg.msg_type === 'authorize') {
      balance = msg.authorize.balance;
      document.getElementById('balance').textContent = balance.toFixed(2);
      statusEl.textContent = 'Connected';
      statusEl.className = 'font-medium text-emerald-400';
      document.getElementById('startBtn').disabled = false;
    }

    if (msg.msg_type === 'balance') {
      balance = msg.balance.balance;
      document.getElementById('balance').textContent = balance.toFixed(2);
    }

    if (msg.msg_type === 'tick' && msg.tick.symbol === 'R_100') {
      const quote = msg.tick.quote;
      addTickToHistory(quote);

      const lastDigit = Math.floor(quote) % 10;
      if ((lastDigit === 8 || lastDigit === 9) && isRunning && !openContract) {
        logMain(`Touch ${lastDigit} → Placing UNDER 8 @ $${currentStake.toFixed(2)}`, 'text-yellow-300 font-medium');
        sendProposal();
      }
    }

    if (msg.msg_type === 'proposal' && !msg.error) {
      ws.send(JSON.stringify({ buy: msg.proposal.id, price: msg.proposal.ask_price }));
    }

    if (msg.msg_type === 'buy') {
      if (msg.error) {
        logMain('Buy failed', 'text-red-400');
        openContract = false;
        return;
      }
      openContract = true;
      document.getElementById('openTrades').textContent = '1';
    }

    if (msg.msg_type === 'proposal_open_contract' && msg.proposal_open_contract.is_sold) {
      const profit = parseFloat(msg.proposal_open_contract.profit || 0);
      totalPnL += profit;
      openContract = false;
      document.getElementById('openTrades').textContent = '0';
      document.getElementById('totalPnl').textContent = totalPnL.toFixed(2);

      pnlHistory.push(totalPnL);
      if (pnlHistory.length > 100) pnlHistory.shift();
      chart.update();

      if (profit > 0) {
        logMain(`WIN +$${profit.toFixed(2)}`, 'text-emerald-400 font-medium');
        consecutiveLosses = 0;
        currentStake = baseStake;
      } else {
        logMain(`LOSS -$${Math.abs(profit).toFixed(2)}`, 'text-red-400 font-medium');
        consecutiveLosses++;
        if (consecutiveLosses === 1) {
          currentStake = baseStake + Math.abs(profit); // recover the loss
        } else if (consecutiveLosses >= 2) {
          currentStake = baseStake;
          consecutiveLosses = 0;
          logMain('2 consecutive losses → reset to base stake', 'text-orange-400');
        }
      }

      // TP / SL check
      if (totalPnL >= tp || totalPnL <= sl) {
        toggleBot();
        logMain(totalPnL >= tp ? '🎯 TAKE PROFIT REACHED' : '🛑 STOP LOSS HIT', 'text-yellow-400 font-bold');
      }
    }
  };
}

function sendProposal() {
  ws.send(JSON.stringify({
    proposal: 1,
    amount: currentStake,
    basis: 'stake',
    contract_type: 'DIGITUNDER',
    barrier: '8',
    currency: 'USD',
    duration: 1,
    duration_unit: 't',
    symbol: 'R_100'
  }));
}

function toggleBot() {
  isRunning = !isRunning;
  document.getElementById('startBtn').textContent = isRunning ? 'Stop' : 'Start';
  document.getElementById('startBtn').classList.toggle('bg-red-600', isRunning);

  if (isRunning) {
    logMain('Bot STARTED', 'text-emerald-400');
    ws.send(JSON.stringify({ ticks: 'R_100' }));
  } else {
    logMain('Bot STOPPED', 'text-amber-400');
    if (ws) ws.send(JSON.stringify({ forget_all: 'ticks' }));
  }
}

function clearMainLog() {
  mainLog.innerHTML = '';
}

window.onload = () => {
  // Equity Curve
  chart = new Chart(document.getElementById('pnlChart'), {
    type: 'line',
    data: { labels: Array(100).fill(''), datasets: [{ data: pnlHistory, borderColor: '#10b981', tension: 0.4 }] },
    options: { plugins: { legend: { display: false } } }
  });

  logMain('Bot ready — waiting for connection', 'text-gray-400');
};
</script>
</body>
</html>
